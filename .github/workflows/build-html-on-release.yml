name: Build HTML (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Prepare wrapper html
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist .pandoc
          printf '<div class="markdown-body">\n' > .pandoc/before.html
          printf '\n</div>\n' > .pandoc/after.html

      - name: Build HTML outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          pandoc API_Doc.md -f gfm -o dist/API_Docs.html --standalone \
            --css assets/github-markdown.css \
            --include-before-body .pandoc/before.html \
            --include-after-body .pandoc/after.html \
            -V header-includes='<style>.markdown-body{max-width:900px;margin:40px auto;padding:0 16px;}.markdown-body h2{font-size:1.5em;}.markdown-body h3{font-size:1.35em;font-weight:600;}.markdown-body h4{font-size:1.1em;}</style>' \
            --metadata pagetitle="Document" \
            --resource-path=.:images \
            --no-highlight

          pandoc README.md -f gfm -o dist/README.html --standalone \
            --css assets/github-markdown.css \
            --include-before-body .pandoc/before.html \
            --include-after-body .pandoc/after.html \
            -V header-includes='<style>.markdown-body{max-width:900px;margin:40px auto;padding:0 16px;}.markdown-body h2{font-size:1.5em;}.markdown-body h3{font-size:1.35em;font-weight:600;}.markdown-body h4{font-size:1.1em;}</style>' \
            --metadata pagetitle="Document" \
            --resource-path=.:images \
            --no-highlight

      - name: Copy images
        shell: bash
        run: |
          set -euo pipefail
          [ -d images ] && cp -r images dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: html-export
          path: dist/*
