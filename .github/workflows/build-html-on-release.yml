name: Build HTML (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build HTML outputs
        run: |
          mkdir -p dist
      
          pandoc API_Doc.md -f gfm -o dist/API_Docs.html --standalone \
            --css assets/github-markdown.css \
            -V body-class=markdown-body \
            --resource-path=.:images
      
          pandoc README.md -f gfm -o dist/README.html --standalone \
            --css assets/github-markdown.css \
            -V body-class=markdown-body \
            --resource-path=.:images
      
      - name: Copy images
        run: |
          cp -r images dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: html-export
          path: dist/*
